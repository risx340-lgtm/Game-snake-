<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .box {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #66bb6a;
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 400/400;
            background: #0d1a0d;
            border-radius: 10px;
            border: 3px solid #2a4a2a;
            touch-action: none;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            padding: 10px 16px;
            margin-top: 12px;
            background: #0d0d1a;
            border-radius: 10px;
            border: 1px solid #2a2a4a;
            color: #aaa;
            font-size: 16px;
            font-weight: bold;
        }
        .hud span {
            color: #f5c842;
            font-size: 20px;
        }
        .hud .skor {
            color: #66bb6a;
        }
        button {
            padding: 8px 24px;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #c73652;
            transform: scale(1.05);
        }
        .info {
            color: #4a4a6a;
            font-size: 12px;
            margin-top: 10px;
        }
        .info kbd {
            background: #1a1a3e;
            padding: 2px 10px;
            border-radius: 4px;
            color: #8a8aaa;
            border: 1px solid #2a2a4a;
        }
        .tombol {
            display: none;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .tombol button {
            padding: 14px 22px;
            font-size: 24px;
            background: #2a2a4a;
            border-radius: 12px;
            min-width: 55px;
            box-shadow: 0 4px 0 #0a0a1a;
        }
        .tombol button:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        @media (pointer: coarse) {
            .tombol {
                display: flex;
            }
        }
    </style>
</head>
<body>

<div class="box">

    <h1>🐍 SNAKE</h1>

    <canvas id="game" width="400" height="400"></canvas>

    <div class="hud">
        <div>🏆 <span class="skor" id="skor">0</span></div>
        <div>📏 <span id="panjang">3</span></div>
        <button id="reset">🔄 Ulang</button>
    </div>

    <div class="tombol">
        <button id="up">⬆</button>
        <button id="down">⬇</button>
        <button id="left">⬅</button>
        <button id="right">➡</button>
    </div>

    <div class="info">
        <kbd>⬆</kbd> <kbd>⬇</kbd> <kbd>⬅</kbd> <kbd>➡</kbd> / <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd>
        &nbsp;|&nbsp; Jangan nabrak tembok/ekor!
    </div>

</div>

<script>
    // ============================================================
    // SNAKE GAME
    // ============================================================

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = 400,
        H = 400;

    const skorEl = document.getElementById('skor');
    const panjangEl = document.getElementById('panjang');

    // ===== KONSTANTA =====
    const SIZE = 20;
    const COLS = W / SIZE;
    const ROWS = H / SIZE;

    // ===== VARIABEL =====
    let snake = [];
    let food = {};
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let score = 0;
    let gameOver = false;
    let gameLoopInterval = null;
    let speed = 150; // ms per tick

    // ===== FUNGSI =====
    function initGame() {
        // Ular: 3 segment di tengah
        snake = [
            { x: 5, y: 10 },
            { x: 4, y: 10 },
            { x: 3, y: 10 }
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        gameOver = false;
        spawnFood();
        updateHUD();
    }

    function spawnFood() {
        let pos;
        let attempts = 0;
        do {
            pos = {
                x: Math.floor(Math.random() * COLS),
                y: Math.floor(Math.random() * ROWS)
            };
            attempts++;
        } while (isOnSnake(pos.x, pos.y) && attempts < 1000);
        food = pos;
    }

    function isOnSnake(x, y) {
        return snake.some(seg => seg.x === x && seg.y === y);
    }

    function updateHUD() {
        skorEl.textContent = score;
        panjangEl.textContent = snake.length;
    }

    function resetGame() {
        if (gameLoopInterval) {
            clearInterval(gameLoopInterval);
            gameLoopInterval = null;
        }
        initGame();
        gameLoopInterval = setInterval(gameTick, speed);
    }

    // ===== GAME TICK =====
    function gameTick() {
        if (gameOver) return;

        // Update arah
        direction = { ...nextDirection };

        // Hitung posisi kepala baru
        const head = snake[0];
        const newHead = {
            x: head.x + direction.x,
            y: head.y + direction.y
        };

        // Cek tabrakan tembok
        if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
            gameOver = true;
            clearInterval(gameLoopInterval);
            gameLoopInterval = null;
            return;
        }

        // Cek tabrakan diri sendiri
        if (isOnSnake(newHead.x, newHead.y)) {
            gameOver = true;
            clearInterval(gameLoopInterval);
            gameLoopInterval = null;
            return;
        }

        // Masukkan kepala baru
        snake.unshift(newHead);

        // Cek apakah makan makanan
        if (newHead.x === food.x && newHead.y === food.y) {
            score += 10;
            spawnFood();
            updateHUD();
            // Speed up dikit (tapi ga terlalu cepat)
            if (speed > 80) {
                speed -= 2;
                clearInterval(gameLoopInterval);
                gameLoopInterval = setInterval(gameTick, speed);
            }
        } else {
            // Hapus ekor
            snake.pop();
        }

        updateHUD();
    }

    // ===== DRAW =====
    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Grid (halus)
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= COLS; i++) {
            ctx.beginPath();
            ctx.moveTo(i * SIZE, 0);
            ctx.lineTo(i * SIZE, H);
            ctx.stroke();
        }
        for (let i = 0; i <= ROWS; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * SIZE);
            ctx.lineTo(W, i * SIZE);
            ctx.stroke();
        }

        // === Makanan ===
        ctx.shadowColor = '#f5c842';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#f5c842';
        ctx.beginPath();
        ctx.arc(
            food.x * SIZE + SIZE / 2,
            food.y * SIZE + SIZE / 2,
            SIZE / 2 - 2,
            0,
            Math.PI * 2
        );
        ctx.fill();
        ctx.shadowBlur = 0;

        // Glow tambahan
        ctx.fillStyle = 'rgba(245,200,66,0.1)';
        ctx.beginPath();
        ctx.arc(
            food.x * SIZE + SIZE / 2,
            food.y * SIZE + SIZE / 2,
            SIZE / 2 + 6,
            0,
            Math.PI * 2
        );
        ctx.fill();

        // === Ular ===
        for (let i = 0; i < snake.length; i++) {
            const seg = snake[i];
            const x = seg.x * SIZE;
            const y = seg.y * SIZE;
            const padding = i === 0 ? 0 : 2;
            const radius = 3;

            // Warna: kepala hijau terang, badan hijau tua
            if (i === 0) {
                ctx.shadowColor = '#66bb6a';
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#66bb6a';
            } else {
                ctx.shadowBlur = 0;
                const ratio = 0.7 - (i / snake.length) * 0.3;
                ctx.fillStyle = `rgb(${40 + 30 * ratio}, ${160 - 40 * ratio}, ${60 + 20 * ratio})`;
            }

            // Kotak dengan sudut melengkung
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + SIZE - radius, y);
            ctx.quadraticCurveTo(x + SIZE, y, x + SIZE, y + radius);
            ctx.lineTo(x + SIZE, y + SIZE - radius);
            ctx.quadraticCurveTo(x + SIZE, y + SIZE, x + SIZE - radius, y + SIZE);
            ctx.lineTo(x + radius, y + SIZE);
            ctx.quadraticCurveTo(x, y + SIZE, x, y + SIZE - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();

            // Mata di kepala
            if (i === 0) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                let ex1, ey1, ex2, ey2;
                if (direction.x === 1) {
                    ex1 = x + 13;
                    ey1 = y + 4;
                    ex2 = x + 13;
                    ey2 = y + 12;
                } else if (direction.x === -1) {
                    ex1 = x + 4;
                    ey1 = y + 4;
                    ex2 = x + 4;
                    ey2 = y + 12;
                } else if (direction.y === -1) {
                    ex1 = x + 4;
                    ey1 = y + 4;
                    ex2 = x + 12;
                    ey2 = y + 4;
                } else {
                    ex1 = x + 4;
                    ey1 = y + 13;
                    ex2 = x + 12;
                    ey2 = y + 13;
                }
                ctx.beginPath();
                ctx.arc(ex1, ey1, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2, ey2, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#0a0a1a';
                ctx.beginPath();
                ctx.arc(ex1 + direction.x * 1.5, ey1 + direction.y * 1.5, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2 + direction.x * 1.5, ey2 + direction.y * 1.5, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.shadowBlur = 0;

        // === Game Over ===
        if (gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, W, H);

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#e94560';
            ctx.font = 'bold 44px Arial';
            ctx.fillText('💀 GAME OVER', W / 2, H / 2 - 30);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#f5c842';
            ctx.font = '26px Arial';
            ctx.fillText(`Skor: ${score}`, W / 2, H / 2 + 35);

            ctx.fillStyle = '#8a8aaa';
            ctx.font = '16px Arial';
            ctx.fillText('Klik "Ulang" untuk main lagi', W / 2, H / 2 + 90);
        }
    }

    // ===== LOOP =====
    function loop() {
        draw();
        requestAnimationFrame(loop);
    }

    // ===== KEYBOARD =====
    document.addEventListener('keydown', (e) => {
        const k = e.key;
        if (gameOver) return;

        if (k === 'ArrowUp' || k === 'w' || k === 'W') {
            if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
            e.preventDefault();
        } else if (k === 'ArrowDown' || k === 's' || k === 'S') {
            if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
            e.preventDefault();
        } else if (k === 'ArrowLeft' || k === 'a' || k === 'A') {
            if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
            e.preventDefault();
        } else if (k === 'ArrowRight' || k === 'd' || k === 'D') {
            if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
            e.preventDefault();
        }
    });

    // ===== RESET =====
    document.getElementById('reset').addEventListener('click', resetGame);

    // ===== TOUCH =====
    function setupTouch(id, dx, dy) {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameOver) return;
            if (direction.x !== -dx) nextDirection = { x: dx, y: dy };
        });
        btn.addEventListener('mousedown', (e) => {
            if (gameOver) return;
            if (direction.x !== -dx) nextDirection = { x: dx, y: dy };
        });
    }
    setupTouch('up', 0, -1);
    setupTouch('down', 0, 1);
    setupTouch('left', -1, 0);
    setupTouch('right', 1, 0);

    // ===== START =====
    initGame();
    gameLoopInterval = setInterval(gameTick, speed);
    loop();

    console.log('🐍 Snake Game Loaded!');
    console.log('📖 Controls: Arrow/WASD, Jangan nabrak tembok/ekor!');
</script>

</body>
</html>
